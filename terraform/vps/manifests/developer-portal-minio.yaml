apiVersion: v1
kind: Service
metadata:
  name: developer-portal-minio
  namespace: fcs-developer-portal
  labels:
    app.kubernetes.io/name: developer-portal-minio
    app.kubernetes.io/part-of: fcs-developer-portal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: developer-portal-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: developer-portal-minio
  namespace: fcs-developer-portal
  labels:
    app.kubernetes.io/name: developer-portal-minio
    app.kubernetes.io/part-of: fcs-developer-portal
spec:
  serviceName: developer-portal-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: developer-portal-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: developer-portal-minio
        app.kubernetes.io/part-of: fcs-developer-portal
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args:
            - server
            - /data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: developer-portal-minio
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: developer-portal-minio
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: api
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-portal-minio-bootstrap
  namespace: fcs-developer-portal
data:
  techdocs-policy.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:GetBucketLocation", "s3:ListBucket"],
          "Resource": ["arn:aws:s3:::techdocs"]
        },
        {
          "Effect": "Allow",
          "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
          "Resource": ["arn:aws:s3:::techdocs/*"]
        }
      ]
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: developer-portal-minio-bootstrap-v1
  namespace: fcs-developer-portal
  labels:
    app.kubernetes.io/name: developer-portal-minio-bootstrap
    app.kubernetes.io/part-of: fcs-developer-portal
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: minio/mc:RELEASE.2025-05-21T01-59-54Z
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set portal http://developer-portal-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 5; done
              mc mb --ignore-existing portal/techdocs
              mc admin policy create portal techdocs-rw /config/techdocs-policy.json || true
              mc admin user add portal "$MINIO_TECHDOCS_ACCESS_KEY" "$MINIO_TECHDOCS_SECRET_KEY" || true
              mc admin policy attach portal techdocs-rw --user "$MINIO_TECHDOCS_ACCESS_KEY"
          envFrom:
            - secretRef:
                name: developer-portal-minio
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: developer-portal-minio-bootstrap
