apiVersion: v1
kind: Service
metadata:
  name: sqlserver-service
  namespace: fcs-infra
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: sqlserver
  ports:
    - name: sqlserver
      port: 1433
      targetPort: 1433
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sqlserver
  namespace: fcs-infra
spec:
  serviceName: sqlserver-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
              name: sqlserver
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Developer
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fcs-infra-runtime
                  key: sql-sa-password
          volumeMounts:
            - name: data
              mountPath: /var/opt/mssql
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1", memory: 2Gi }
          readinessProbe:
            tcpSocket: { port: 1433 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 1433 }
            initialDelaySeconds: 90
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 25Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sqlserver-init-config
  namespace: fcs-infra
data:
  init-db.sql: |
    IF DB_ID(N'IdentityDb') IS NULL CREATE DATABASE [IdentityDb];
    IF DB_ID(N'CampaignsDb') IS NULL CREATE DATABASE [CampaignsDb];
    IF DB_ID(N'DonationsDb') IS NULL CREATE DATABASE [DonationsDb];
    IF DB_ID(N'KeycloakDb') IS NULL CREATE DATABASE [KeycloakDb];
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sqlserver-init
  namespace: fcs-infra
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-databases
          image: mcr.microsoft.com/mssql/server:2022-latest
          command: [/bin/bash, -c]
          args:
            - |
              set -euo pipefail
              if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
                SQLCMD=/opt/mssql-tools18/bin/sqlcmd
                TRUST_ARG=-C
              else
                SQLCMD=/opt/mssql-tools/bin/sqlcmd
                TRUST_ARG=
              fi
              for attempt in $(seq 1 60); do
                "$SQLCMD" -S sqlserver-service -U sa -P "$SA_PASSWORD" $TRUST_ARG -Q "SELECT 1" >/dev/null 2>&1 && break
                [ "$attempt" -eq 60 ] && exit 1
                sleep 5
              done
              "$SQLCMD" -S sqlserver-service -U sa -P "$SA_PASSWORD" $TRUST_ARG -i /scripts/init-db.sql
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fcs-infra-runtime
                  key: sql-sa-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: sqlserver-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: fcs-infra
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 29092
      targetPort: 29092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: fcs-infra
spec:
  serviceName: kafka-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 29092
              name: plaintext
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: 1@localhost:9093 }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: PLAINTEXT://kafka-service.fcs-infra.svc.cluster.local:29092 }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: PLAINTEXT }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: CONTROLLER }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "false" }
            - { name: CLUSTER_ID, value: MkU3OEVBNTcwNTJENDM2Qk }
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 29092 }
            initialDelaySeconds: 45
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 15Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: fcs-infra
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: confluentinc/cp-kafka:7.5.0
          command: [/bin/bash, -c]
          args:
            - |
              set -euo pipefail
              for attempt in $(seq 1 60); do
                kafka-topics --bootstrap-server kafka-service:29092 --list >/dev/null 2>&1 && break
                [ "$attempt" -eq 60 ] && exit 1
                sleep 5
              done
              kafka-topics --bootstrap-server kafka-service:29092 --create --if-not-exists --topic donation-received --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka-service:29092 --create --if-not-exists --topic audit-log-requested --partitions 1 --replication-factor 1
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: fcs-infra
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: fcs-infra
spec:
  serviceName: mongodb-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8.0
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec:
              command: [mongosh, --quiet, --eval, "db.adminCommand('ping').ok || quit(1)"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: fcs-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: fcs-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.5
          args: [start, --import-realm, --http-enabled=true]
          ports:
            - containerPort: 8080
              name: http
          env:
            - { name: KEYCLOAK_ADMIN, value: admin }
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: fcs-infra-runtime, key: keycloak-admin-password }
            - { name: KC_HEALTH_ENABLED, value: "true" }
            - { name: KC_PROXY_HEADERS, value: xforwarded }
            - { name: KC_HOSTNAME, value: fcs-keycloak.flaviojcf.com.br }
            - { name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC, value: "true" }
            - { name: KC_DB, value: mssql }
            - { name: KC_DB_URL, value: jdbc:sqlserver://sqlserver-service:1433;databaseName=KeycloakDb;encrypt=false;trustServerCertificate=true }
            - { name: KC_DB_USERNAME, value: sa }
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: fcs-infra-runtime, key: sql-sa-password }
            - { name: KC_TRANSACTION_XA_ENABLED, value: "false" }
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 45
            periodSeconds: 10
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm-config
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fcs-keycloak-tls
  namespace: fcs-infra
spec:
  secretName: fcs-keycloak-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - fcs-keycloak.flaviojcf.com.br
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fcs-keycloak
  namespace: fcs-infra
spec:
  ingressClassName: fcs-traefik
  tls:
    - hosts:
        - fcs-keycloak.flaviojcf.com.br
      secretName: fcs-keycloak-tls
  rules:
    - host: fcs-keycloak.flaviojcf.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak-service
                port:
                  number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-service
  namespace: fcs-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: fcs-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          ports:
            - containerPort: 8080
              name: http
          env:
            - { name: KAFKA_CLUSTERS_0_NAME, value: fcs }
            - { name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS, value: kafka-service.fcs-infra.svc.cluster.local:29092 }
            - { name: KAFKA_CLUSTERS_0_READONLY, value: "true" }
            - { name: AUTH_TYPE, value: LOGIN_FORM }
            - { name: SPRING_SECURITY_USER_NAME, value: admin }
            - name: SPRING_SECURITY_USER_PASSWORD
              valueFrom:
                secretKeyRef: { name: fcs-infra-runtime, key: kafka-ui-password }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fcs-kafka-ui-tls
  namespace: fcs-infra
spec:
  secretName: fcs-kafka-ui-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - fcs-kafka-ui.flaviojcf.com.br
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fcs-kafka-ui
  namespace: fcs-infra
spec:
  ingressClassName: fcs-traefik
  tls:
    - hosts:
        - fcs-kafka-ui.flaviojcf.com.br
      secretName: fcs-kafka-ui-tls
  rules:
    - host: fcs-kafka-ui.flaviojcf.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui-service
                port:
                  number: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: fcs-infra
data:
  config.yml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: {}
    exporters:
      datadog:
        api:
          site: us5.datadoghq.com
          key: ${env:DD_API_KEY}
    service:
      telemetry:
        logs: { level: info }
      pipelines:
        traces: { receivers: [otlp], processors: [batch], exporters: [datadog] }
        metrics: { receivers: [otlp], processors: [batch], exporters: [datadog] }
        logs: { receivers: [otlp], processors: [batch], exporters: [datadog] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: fcs-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.118.0
          args: [--config=/etc/otelcol/config.yml]
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fcs-datadog-api-key
                  key: api-key
          ports:
            - { containerPort: 4317, name: otlp-grpc }
            - { containerPort: 4318, name: otlp-http }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol, readOnly: true }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-service
  namespace: fcs-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
