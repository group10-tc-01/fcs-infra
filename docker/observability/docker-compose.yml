name: fcs-observability

services:
  datadog-agent:
    image: datadog/agent:7
    container_name: fcs-datadog-agent
    environment:
      DD_API_KEY: ${DD_API_KEY:?DD_API_KEY is required}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: ${DD_ENV:-local}
      DD_SERVICE: fcs-infra
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_CONTAINER_LABELS_AS_TAGS: '{"com.docker.compose.service":"compose_service"}'
    ports:
      - "8125:8125/udp"
      - "8126:8126"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: fcs-otel-collector
    command:
      - --config=/etc/otelcol/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    environment:
      DD_API_KEY: ${DD_API_KEY:?DD_API_KEY is required}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: ${DD_ENV:-local}
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol/config.yml:ro
    networks:
      - observability

networks:
  observability:
    name: fcs-observability
