apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity-provider
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.5
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-local-secret
                  key: admin-password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_DB
              value: mssql
            - name: KC_DB_URL
              value: jdbc:sqlserver://sqlserver-service:1433;databaseName=KeycloakDb;encrypt=false;trustServerCertificate=true
            - name: KC_DB_USERNAME
              value: sa
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-local-secret
                  key: sa-password
            - name: KC_TRANSACTION_XA_ENABLED
              value: "false"
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity-provider
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
