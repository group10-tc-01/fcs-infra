apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: kafka-topics-init
    app.kubernetes.io/component: messaging
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topics-init
        app.kubernetes.io/component: messaging
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for Kafka..."
              for attempt in $(seq 1 60); do
                if kafka-broker-api-versions --bootstrap-server kafka-service:29092 >/dev/null 2>&1; then
                  echo "Kafka is ready."
                  break
                fi

                if [ "$attempt" -eq 60 ]; then
                  echo "Kafka did not become ready in time."
                  exit 1
                fi

                sleep 5
              done

              kafka-topics --bootstrap-server kafka-service:29092 --create --if-not-exists --topic donation-received --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka-service:29092 --create --if-not-exists --topic audit-log-requested --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka-service:29092 --list
