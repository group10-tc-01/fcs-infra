apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
data:
  config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      resource:
        attributes:
          - key: deployment.environment
            value: local
            action: upsert
          - key: service.namespace
            value: fcs
            action: upsert
      batch:
        timeout: 5s
        send_batch_size: 1024

    connectors:
      datadog/connector:

    exporters:
      datadog:
        api:
          key: ${env:DD_API_KEY}
          site: ${env:DD_SITE}
      debug:
        verbosity: basic

    service:
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [datadog/connector, datadog, debug]
        metrics:
          receivers: [otlp, datadog/connector]
          processors: [resource, batch]
          exporters: [datadog]
        logs:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [datadog]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.118.0
          args:
            - --config=/etc/otelcol/config.yml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8888
              name: metrics
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-local-secret
                  key: api-key
            - name: DD_SITE
              valueFrom:
                secretKeyRef:
                  name: datadog-local-secret
                  key: site
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol
              readOnly: true
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-service
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
