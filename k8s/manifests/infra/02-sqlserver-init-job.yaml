apiVersion: v1
kind: ConfigMap
metadata:
  name: sqlserver-init-config
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: sqlserver-init
    app.kubernetes.io/component: database
data:
  init-db.sql: |
    IF DB_ID(N'IdentityDb') IS NULL CREATE DATABASE [IdentityDb];
    IF DB_ID(N'CampaignsDb') IS NULL CREATE DATABASE [CampaignsDb];
    IF DB_ID(N'DonationsDb') IS NULL CREATE DATABASE [DonationsDb];
    IF DB_ID(N'KeycloakDb') IS NULL CREATE DATABASE [KeycloakDb];
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sqlserver-init
  namespace: fcs-infra
  labels:
    app.kubernetes.io/name: sqlserver-init
    app.kubernetes.io/component: database
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver-init
        app.kubernetes.io/component: database
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-databases
          image: mcr.microsoft.com/mssql/server:2022-latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
                SQLCMD=/opt/mssql-tools18/bin/sqlcmd
                TRUST_ARG=-C
              else
                SQLCMD=/opt/mssql-tools/bin/sqlcmd
                TRUST_ARG=
              fi

              echo "Waiting for SQL Server..."
              for attempt in $(seq 1 60); do
                if "$SQLCMD" -S sqlserver-service -U sa -P "$SA_PASSWORD" $TRUST_ARG -Q "SELECT 1" >/dev/null 2>&1; then
                  echo "SQL Server is ready."
                  break
                fi

                if [ "$attempt" -eq 60 ]; then
                  echo "SQL Server did not become ready in time."
                  exit 1
                fi

                sleep 5
              done

              "$SQLCMD" -S sqlserver-service -U sa -P "$SA_PASSWORD" $TRUST_ARG -i /scripts/init-db.sql
              echo "Local databases are ready."
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-local-secret
                  key: sa-password
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
      volumes:
        - name: init-scripts
          configMap:
            name: sqlserver-init-config
