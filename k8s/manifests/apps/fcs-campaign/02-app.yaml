apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcs-campaign
  namespace: fcs-campaign
  labels:
    app.kubernetes.io/name: fcs-campaign
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fcs-campaign
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcs-campaign
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: fcs-campaign
          image: ghcr.io/group10-tc-01/fcs-campaign:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: fcs-campaign-local-config
          env:
            - name: ConnectionStrings__SqlServer
              valueFrom:
                secretKeyRef:
                  name: fcs-campaign-local-secret
                  key: sqlserver-connection-string
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: fcs-campaign-service
  namespace: fcs-campaign
  labels:
    app.kubernetes.io/name: fcs-campaign
    app.kubernetes.io/component: api
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: fcs-campaign
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30084
