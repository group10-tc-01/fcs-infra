name: FCS VPS Terraform

on:
  pull_request:
    paths:
      - "terraform/vps/**"
      - "terraform/vps/manifests/**"
      - ".github/workflows/vps-terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/vps/**"
      - "terraform/vps/manifests/**"
      - ".github/workflows/vps-terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fcs-vps-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_vps_host: ${{ vars.VPS_HOST }}
  TF_VAR_vps_ssh_user: ${{ vars.VPS_BOOTSTRAP_USER }}
  TF_VAR_vps_deploy_user: ${{ vars.VPS_DEPLOY_USER }}
  TF_VAR_domain: flaviojcf.com.br
  TF_VAR_acme_email: ${{ vars.ACME_EMAIL }}
  TF_VAR_infisical_project_slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
  TF_VAR_infisical_environment_slug: prod
  TF_VAR_infisical_operator_chart_version: ${{ vars.INFISICAL_OPERATOR_CHART_VERSION }}
  TF_VAR_ssh_allowed_cidrs: ${{ vars.VPS_SSH_ALLOWED_CIDRS }}

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/vps
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
      - name: Format and validate configuration
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate
      - name: Plan host bootstrap only
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
          HCP_TERRAFORM_ORGANIZATION: ${{ vars.HCP_TERRAFORM_ORGANIZATION }}
          HCP_TERRAFORM_WORKSPACE: ${{ vars.HCP_TERRAFORM_WORKSPACE }}
          TF_VAR_hostinger_api_token: ${{ secrets.HOSTINGER_API_TOKEN }}
          TF_VAR_vps_ssh_private_key: ${{ secrets.VPS_BOOTSTRAP_SSH_KEY }}
          TF_VAR_vps_host: 192.0.2.10
          TF_VAR_infisical_operator_chart_version: 0.11.3
          TF_VAR_ssh_allowed_cidrs: '["192.0.2.0/24"]'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TF_TOKEN_app_terraform_io"
          test -n "$HCP_TERRAFORM_ORGANIZATION"
          test -n "$HCP_TERRAFORM_WORKSPACE"
          cat > backend.hcl <<EOF
          hostname     = "app.terraform.io"
          organization = "$HCP_TERRAFORM_ORGANIZATION"
          workspaces { name = "$HCP_TERRAFORM_WORKSPACE" }
          EOF
          terraform init -reconfigure -input=false -backend-config=backend.hcl
          terraform plan -refresh=false -lock=false -var=apply_cluster=false -var=apply_platform=false

  apply:
    name: Bootstrap and apply VPS platform
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: [self-hosted, fcs-vps]
    environment: production
    defaults:
      run:
        working-directory: terraform/vps
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}
      TF_VAR_hostinger_api_token: ${{ secrets.HOSTINGER_API_TOKEN }}
      TF_VAR_vps_ssh_private_key: ${{ secrets.VPS_BOOTSTRAP_SSH_KEY }}
      TF_VAR_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_ID }}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${{ secrets.INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET }}
      VPS_HOST: ${{ vars.VPS_HOST }}
      VPS_BOOTSTRAP_USER: ${{ vars.VPS_BOOTSTRAP_USER }}
      VPS_DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
      HCP_TERRAFORM_ORGANIZATION: ${{ vars.HCP_TERRAFORM_ORGANIZATION }}
      HCP_TERRAFORM_WORKSPACE: ${{ vars.HCP_TERRAFORM_WORKSPACE }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          # The self-hosted runner does not provide Node.js. The default wrapper
          # from setup-terraform requires it, while Terraform itself does not.
          terraform_wrapper: false
      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          for value in "$VPS_HOST" "$VPS_BOOTSTRAP_USER" "$VPS_DEPLOY_USER" "$HCP_TERRAFORM_ORGANIZATION" "$HCP_TERRAFORM_WORKSPACE" "$TF_VAR_acme_email" "$TF_VAR_infisical_project_slug" "$TF_VAR_infisical_operator_chart_version" "$TF_VAR_ssh_allowed_cidrs"; do
            test -n "$value" || { echo "A production variable is not configured." >&2; exit 1; }
          done
      - name: Configure HCP backend
        shell: bash
        run: |
          set -euo pipefail
          cat > backend.hcl <<EOF
          hostname     = "app.terraform.io"
          organization = "$HCP_TERRAFORM_ORGANIZATION"
          workspaces { name = "$HCP_TERRAFORM_WORKSPACE" }
          EOF
          terraform init -input=false -backend-config=backend.hcl
      - name: Bootstrap host and K3s when required
        shell: bash
        run: |
          set -euo pipefail
          state_resources="$(terraform state list)"
          if grep -q '^module\.cluster\[0\]\.' <<< "$state_resources"; then
            echo "Kubernetes resources already exist in state; skipping host bootstrap."
          else
            terraform apply -auto-approve -var=apply_cluster=false -var=apply_platform=false
          fi
      - name: Install cluster foundation
        shell: bash
        run: terraform apply -auto-approve -var=apply_cluster=true -var=apply_platform=false
      - name: Inject Infisical bootstrap identity
        shell: bash
        run: |
          set -euo pipefail
          credentials="$RUNNER_TEMP/infisical-universal-auth.env"
          umask 077
          printf 'clientId=%s\nclientSecret=%s\n' "$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" "$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" > "$credentials"
          kubectl -n infisical-operator-system create secret generic infisical-universal-auth \
            --from-env-file="$credentials" --dry-run=client -o yaml | kubectl apply -f -
          rm -f "$credentials"
      - name: Apply shared FCS platform
        shell: bash
        run: terraform apply -auto-approve -var=apply_cluster=true -var=apply_platform=true
      - name: Verify platform rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n fcs-infra rollout status statefulset/sqlserver --timeout=300s
          kubectl -n fcs-infra rollout status statefulset/kafka --timeout=300s
          kubectl -n fcs-infra rollout status deployment/keycloak --timeout=300s
          kubectl -n fcs-infra get jobs sqlserver-init kafka-topics-init keycloak-bootstrap
