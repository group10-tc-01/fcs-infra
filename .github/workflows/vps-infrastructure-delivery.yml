name: fcs-infra VPS delivery

on:
  pull_request:
    paths:
      - "k8s/vps/**"
      - "ops/vps/**"
      - ".github/workflows/vps-infrastructure-delivery.yml"
  push:
    branches:
      - main
    paths:
      - "k8s/vps/**"
      - "ops/vps/**"
      - ".github/workflows/vps-infrastructure-delivery.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fcs-infra-vps-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate infrastructure release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Bash scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n k8s/vps/deploy-infra.sh
          bash -n k8s/vps/up.sh
          bash -n k8s/vps/down.sh
          bash -n ops/vps/bootstrap-fcs-infra-deployer.sh
          bash -n ops/vps/fcs-infra-apply

      - name: Validate JSON and YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool k8s/vps/realm/conexao-solidaria-realm.json >/dev/null
          mapfile -t yaml_files < <(find k8s/vps .github/workflows -type f \( -name "*.yaml" -o -name "*.yml" \) -print)
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.parse_stream(File.read(path)) }; puts "YAML syntax OK"' \
            "${yaml_files[@]}"

      - name: Reject committed Kubernetes Secrets and credentials
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^[[:space:]]*kind:[[:space:]]*Secret([[:space:]]|$)' k8s/vps; then
            echo "Kubernetes Secret manifests are not allowed in the VPS release." >&2
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path

          forbidden = ("Your_password123", "StrongPassword123")
          for path in Path("k8s/vps").rglob("*"):
              if not path.is_file():
                  continue
              text = path.read_text(encoding="utf-8")
              if any(value in text for value in forbidden):
                  raise SystemExit(f"credential literal found in {path}")
          PY

      - name: Check repository whitespace
        run: git diff --check

      - name: Validate GitHub Actions workflow with actionlint
        run: >-
          docker run --rm
          -v "${GITHUB_WORKSPACE}:/repo:ro"
          rhysd/actionlint:latest
          -color /repo/.github/workflows/vps-infrastructure-delivery.yml

  apply:
    name: Deliver release to VPS
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure dedicated SSH client
        shell: bash
        env:
          FCS_INFRA_SSH_KEY: ${{ secrets.FCS_INFRA_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$FCS_INFRA_SSH_KEY" || { echo "FCS_INFRA_SSH_KEY is not configured." >&2; exit 1; }
          test -n "$VPS_KNOWN_HOSTS" || { echo "VPS_KNOWN_HOSTS is not configured." >&2; exit 1; }
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$FCS_INFRA_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519"
          chmod 0644 "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Package immutable release
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[a-f0-9]{40}$ ]] || { echo "Unexpected release SHA." >&2; exit 1; }
          tar \
            --exclude=.git \
            --exclude='*.env' \
            --exclude='*.pem' \
            --exclude='*.key' \
            -czf "$RUNNER_TEMP/fcs-infra-release.tgz" .

      - name: Upload and apply release through the fixed wrapper
        shell: bash
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          [[ "$VPS_HOST" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "Invalid VPS_HOST." >&2; exit 1; }
          [[ "$VPS_DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]] || { echo "Invalid VPS_DEPLOY_USER." >&2; exit 1; }
          release_dir="/opt/fcs-infra/releases/$GITHUB_SHA"
          target="$VPS_DEPLOY_USER@$VPS_HOST"
          ssh_opts=(
            -i "$HOME/.ssh/id_ed25519"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o ConnectTimeout=20
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
          )
          # shellcheck disable=SC2029
          ssh "${ssh_opts[@]}" "$target" "mkdir -p '$release_dir'"
          scp "${ssh_opts[@]}" "$RUNNER_TEMP/fcs-infra-release.tgz" "$target:$release_dir/.release.tgz"
          # shellcheck disable=SC2029
          ssh "${ssh_opts[@]}" "$target" \
            "tar --no-same-owner --no-same-permissions -xzf '$release_dir/.release.tgz' -C '$release_dir' && rm -f '$release_dir/.release.tgz' && sudo -n /usr/local/sbin/fcs-infra-apply '$release_dir'"
